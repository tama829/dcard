<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>dカード診断</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont;
  background: #f5f6fa;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

h1 { text-align: center; }

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 10px;
  background: #e6002d;
  color: white;
  font-size: 16px;
}

.hidden { display: none; }

.result-card {
  padding: 15px;
  margin-top: 10px;
  border-radius: 10px;
  background: #f0f3ff;
}
</style>
</head>

<body>
<div class="container">

<h1>dカード診断</h1>

<div class="card" id="form">

<h3>dカード保有状況</h3>
<select id="hasCard">
<option value="no">持っていない</option>
<option value="yes">持っている</option>
</select>

<div id="cardArea" class="hidden">
<h3>カード種類</h3>
<select id="cardType">
<option>dカード</option>
<option>dカードGOLD</option>
<option>dカードGOLD U</option>
<option>dカードPLATINUM</option>
</select>
</div>

<h3>ケータイ料金プラン</h3>
<select id="plan">
<option>ドコモ MAX</option>
<option>ドコモ ポイ活 MAX</option>
<option>ドコモ ポイ活 20</option>
<option>ドコモ mini</option>
<option>eximo ポイ活</option>
<option>eximo</option>
<option>irumo(0.5GBを除く)</option>
<option>irumo(0.5GB)</option>
<option>5Gギガホプレミア</option>
<option>5Gギガホ</option>
<option>5Gギガライト</option>
<option>ギガホプレミア</option>
<option>ギガホ(定期契約なし)</option>
<option>ギガライト(定期契約なし)</option>
<option>はじめてスマホプラン</option>
<option>U15はじめてスマホプラン</option>
<option>ケータイプラン(定期契約なし)</option>
<option>ahamo</option>
</select>

<h3>ケータイ料金(月額)</h3>
<input type="number" id="mobileFee">

<h3>ドコモ光/home5G</h3>
<select id="hikari">
<option value="no">なし</option>
<option value="yes">あり</option>
</select>

<input type="number" id="hikariFee" placeholder="月額料金" class="hidden">

<h3>ドコモでんき</h3>
<select id="denki">
<option value="no">なし</option>
<option value="yes">あり</option>
</select>

<div id="denkiArea" class="hidden">
<select id="area">
<option>北海道、東北、東京、北陸、中国、四国</option>
<option>中部、関西、九州</option>
</select>

<select id="planDenki">
<option>Basic</option>
<option>Green</option>
</select>

<select id="gas">
<option value="no">ガスなし</option>
<option value="yes">ガスあり</option>
</select>

<input type="number" id="denkiFee" placeholder="月額料金">
</div>

<h3>月々の利用額</h3>
<input type="number" id="usage">

<br><br>
<button onclick="calc()">診断する</button>

</div>

<div id="result" class="card hidden"></div>

</div>

<script>
document.getElementById("hasCard").onchange = e => {
  document.getElementById("cardArea").classList.toggle("hidden", e.target.value==="no");
};

document.getElementById("hikari").onchange = e => {
  document.getElementById("hikariFee").classList.toggle("hidden", e.target.value==="no");
};

document.getElementById("denki").onchange = e => {
  document.getElementById("denkiArea").classList.toggle("hidden", e.target.value==="no");
};

function floor100(v){ return Math.floor(v/1000)*1000; }

function mobileDiscount(plan, card){
  if(["irumo(0.5GB)","ahamo"].includes(plan)) return 0;

  if(["ドコモ MAX","ドコモ ポイ活 MAX","ドコモ ポイ活 20","ドコモ mini"].includes(plan)){
    if(["dカードPLATINUM","dカードGOLD","dカードGOLD U"].includes(card)) return 550;
    if(card==="dカード") return 220;
  }

  return 187;
}

function mobileRate(plan, card){
  if(plan==="ahamo") return 0;

  const highPlans = ["ドコモ mini","irumo(0.5GBを除く)","irumo(0.5GB)"];

  if(!highPlans.includes(plan)){
    if(card==="dカードPLATINUM") return 0.2;
    if(card==="dカードGOLD") return 0.1;
    if(card==="dカードGOLD U") return 0.05;
    if(card==="dカード") return 0.01;
  }

  if(highPlans.includes(plan)){
    if(["dカードPLATINUM","dカードGOLD","dカードGOLD U"].includes(card)) return 0.01;
    return 0.005;
  }
}

function hikariRate(card){
  if(card==="dカードPLATINUM") return 0.2;
  if(card==="dカードGOLD") return 0.1;
  if(card==="dカードGOLD U") return 0.05;
  if(card==="dカード") return 0.01;
}

function denkiRate(area, plan, gas, card){

  const isA = area === "中部、関西、九州";
  const isB = area === "北海道、東北、東京、北陸、中国、四国";

  // --- でんきなし ---
  if(document.getElementById("denki").value==="no") return 0;

  // =====================
  // PLATINUM
  // =====================
  if(card==="dカードPLATINUM"){

    if(plan==="Basic"){
      if(gas==="yes") return 0.04;
      return 0.02;
    }

    if(plan==="Green"){
      if(isA){
        if(gas==="yes") return 0.22;
        return 0.20;
      }
      if(isB){
        if(gas==="yes") return 0.14;
        return 0.12;
      }
    }
  }

  // =====================
  // GOLD / GOLD U
  // =====================
  if(card==="dカードGOLD" || card==="dカードGOLD U"){

    if(plan==="Basic"){
      if(gas==="yes") return 0.04;
      return 0.02;
    }

    if(plan==="Green"){
      if(isA){
        if(gas==="yes") return 0.12;
        return 0.10;
      }
      if(isB){
        if(gas==="yes") return 0.08;
        return 0.06;
      }
    }
  }

  // =====================
  // dカード
  // =====================
  if(card==="dカード"){

    if(plan==="Basic"){
      return 0.01;
    }

    if(plan==="Green"){
      return 0.02;
    }
  }

  return 0;
}

function annualFee(card){
  if(card==="dカード") return 0;
  if(card==="dカードGOLD U") return 3300;
  if(card==="dカードGOLD") return 11000;
  if(card==="dカードPLATINUM") return 29700;
  return 0;
}

function calc(){

  const hasCard = document.getElementById("hasCard").value;
  const plan = document.getElementById("plan").value;
  const mobileFee = Number(document.getElementById("mobileFee").value);
  const usage = Number(document.getElementById("usage").value);

  const cards = ["dカード","dカードGOLD","dカードGOLD U","dカードPLATINUM"];

  let html = "<h2>診断結果</h2>";

cards.forEach(card => {

  let mobileDiscountMonthly = mobileDiscount(plan, card);
  let mobileDiscountTotal = mobileDiscountMonthly * 12;

  let mobileBase = floor100(mobileFee);
  let mobileRateVal = mobileRate(plan, card);
  let mobilePointMonthly = mobileBase * mobileRateVal;
  let mobilePoint = mobilePointMonthly * 12;

  let hikariPointMonthly = 0;
  let hikariPoint = 0;
  let hikariBase = 0;

  let denkiPointMonthly = 0;
  let denkiPoint = 0;
  let denkiBase = 0;

  let bonus = 0;
  let fee = annualFee(card);

  // --- 光 ---
  if(document.getElementById("hikari").value==="yes"){
    const feeH = Number(document.getElementById("hikariFee").value);
    hikariBase = floor100(feeH);
    hikariPointMonthly = hikariBase * hikariRate(card);
    hikariPoint = hikariPointMonthly * 12;
  }

  // --- でんき ---
  if(document.getElementById("denki").value==="yes"){
    const area = document.getElementById("area").value;
    const planDenki = document.getElementById("planDenki").value;
    const gas = document.getElementById("gas").value;
    const feeD = Number(document.getElementById("denkiFee").value);

    denkiBase = floor100(feeD);
    const rate = denkiRate(area, planDenki, gas, card);
    denkiPointMonthly = denkiBase * rate;
    denkiPoint = denkiPointMonthly * 12;
  }

  // --- 年間特典 ---
  const yearly = usage * 12;

  if(yearly >= 1000000){
    if(card==="dカードGOLD" || card==="dカードPLATINUM") bonus += 10000;
  }
  if(card==="dカードPLATINUM"){
    if(yearly >= 2000000) bonus += 10000;
    if(yearly >= 3000000) bonus += 10000;
    if(yearly >= 4000000) bonus += 10000;
  }

let total =
  fee -
  mobileDiscountTotal -
  mobilePoint -
  hikariPoint -
  denkiPoint -
  bonus;

let extraText = "";

if(total >= 0){
  let monthlyCost = Math.floor(total / 12);

  let hosho = 0;
  if(card==="dカード") hosho = 3;
  if(card==="dカードGOLD U") hosho = 10;
  if(card==="dカードGOLD") hosho = 12;
  if(card==="dカードPLATINUM") hosho = 20;

  extraText = `
  <br>
  <b>👉 実質月額 ${monthlyCost.toLocaleString()}円でケータイ補償 ${hosho.toLocaleString()}万円分</b>
  `;
}

html += `
<div class="result-card">
  <b>${card}</b><br><br>

  💳 年会費：${fee.toLocaleString()}円<br>

  📱 プラン割引：
  ${mobileDiscountMonthly.toLocaleString()}円 ×12ヶ月＝${mobileDiscountTotal.toLocaleString()}円<br>

  📱 ケータイ料金：
${Math.floor(mobilePointMonthly).toLocaleString()}pt ×12ヶ月＝${Math.floor(mobilePoint).toLocaleString()} pt<br>

  🌐 ドコモ光：
${Math.floor(hikariPointMonthly).toLocaleString()}pt ×12ヶ月＝${Math.floor(hikariPoint).toLocaleString()} pt<br>

  ⚡ ドコモでんき：
${Math.floor(denkiPointMonthly).toLocaleString()}pt ×12ヶ月＝${Math.floor(denkiPoint).toLocaleString()} pt<br>

  🎁 年間特典：
  ${bonus.toLocaleString()}円<br>

  <hr>

<b>👉 実質負担額：${Math.floor(total).toLocaleString()}円</b>
${extraText}

</div>
`;
});

document.getElementById("result").innerHTML = html;
  document.getElementById("result").classList.remove("hidden");
}
</script>

</body>
</html>
